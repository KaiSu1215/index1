<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词选择题 — Vocabulary Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 24px 16px;
}

.container {
  width: 100%;
  max-width: 720px;
  background: #fff;
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 8px 40px rgba(0,0,0,0.04);
  position: relative;
  overflow: hidden;
}

/* ====== TOC ====== */
.toc-header {
  text-align: center;
  margin-bottom: 6px;
}
.toc-header h1 {
  font-size: 26px;
  font-weight: 700;
  color: #1e293b;
  letter-spacing: -0.3px;
}
.toc-header .subtitle {
  color: #94a3b8;
  font-size: 14px;
  margin-top: 4px;
}

.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin: 22px 0 18px;
}

.unit-card {
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 16px;
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.22s ease;
  position: relative;
  overflow: hidden;
}
.unit-card:hover {
  border-color: #6366f1;
  background: #eef2ff;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(99,102,241,0.12);
}
.unit-card:active { transform: scale(0.98); }

.unit-card .unit-title {
  font-size: 17px;
  font-weight: 700;
  color: #334155;
  margin-bottom: 4px;
}
.unit-card .unit-count {
  font-size: 13px;
  color: #94a3b8;
}

.unit-card.all-card {
  border-color: #6366f1;
  background: linear-gradient(135deg, #eef2ff, #f5f3ff);
}
.unit-card.all-card:hover {
  background: linear-gradient(135deg, #e0e7ff, #ede9fe);
  box-shadow: 0 4px 20px rgba(99,102,241,0.18);
}
.unit-card.all-card .unit-title { color: #4f46e5; }

/* ====== Quiz Area ====== */
.quiz-area { display: none; }

.progress-wrap { margin-bottom: 22px; }
.progress-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; color: #64748b; font-size: 14px;
}
.progress-bar {
  height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); width: 0%;
}

.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
  background: #fff; color: #64748b; font-size: 13px; cursor: pointer;
  font-family: inherit; margin-bottom: 12px; transition: all 0.2s;
}
.back-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }

.card-area { position: relative; min-height: 380px; }

.card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 18px;
  padding: 24px 22px;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
}
.card.slide-left  { transform: translateX(-130%); opacity: 0; }
.card.slide-right { transform: translateX(130%); opacity: 0; }
.card.slide-in    { transform: translateX(0); opacity: 1; }

.sentence {
  font-size: 17px; line-height: 1.8; color: #1e293b;
  margin-bottom: 24px; padding: 16px 18px;
  background: #f8fafc; border-radius: 12px;
  border-left: 4px solid #6366f1;
}
.sentence .blank {
  display: inline-block; min-width: 70px;
  border-bottom: 3px dashed #a78bfa; color: #7c3aed;
  padding: 0 4px; margin: 0 2px; font-weight: 600; transition: all 0.3s;
}
.sentence .blank.filled        { border-color: #22c55e; color: #16a34a; }
.sentence .blank.filled-wrong  { border-color: #ef4444; color: #dc2626; }

.options { display: grid; gap: 10px; }

.option-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: #f8fafc;
  border: 1.5px solid #e2e8f0; border-radius: 14px;
  color: #334155; font-size: 15px; cursor: pointer;
  transition: all 0.18s ease; text-align: left; font-family: inherit; width: 100%;
}
.option-btn:hover:not(.disabled) {
  background: #eef2ff; border-color: #a5b4fc;
}
.option-btn:active:not(.disabled) { transform: scale(0.98); }
.option-btn.disabled { cursor: default; pointer-events: none; }

.option-btn .letter {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 10px;
  background: #e2e8f0; font-weight: 700; font-size: 14px;
  color: #64748b; flex-shrink: 0; transition: all 0.3s;
}

.option-btn.correct {
  background: #f0fdf4; border-color: #22c55e; color: #166534;
  animation: correctPulse 0.6s ease;
}
.option-btn.correct .letter { background: #22c55e; color: #fff; }

.option-btn.wrong {
  background: #fef2f2; border-color: #ef4444; color: #991b1b;
  animation: shake 0.5s ease;
}
.option-btn.wrong .letter { background: #ef4444; color: #fff; }

.option-btn.reveal-correct {
  background: #f0fdf4; border-color: #86efac;
}
.option-btn.reveal-correct .letter { background: #bbf7d0; color: #16a34a; }

@keyframes correctPulse {
  0%,100%{transform:scale(1);} 50%{transform:scale(1.02);}
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);} 40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);} 80%{transform:translateX(4px);}
}

.feedback {
  margin-top: 16px; padding: 13px 16px; border-radius: 12px;
  font-size: 14px; font-weight: 600; text-align: center;
  display: none; animation: fadeInUp 0.35s ease;
}
.feedback.show { display: block; }
.feedback.correct-fb { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.feedback.wrong-fb   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

@keyframes fadeInUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.nav-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 24px; gap: 12px;
}
.nav-btn {
  padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: 1.5px solid #e2e8f0;
  background: #fff; color: #475569; transition: all 0.2s;
  font-family: inherit; display: flex; align-items: center; gap: 6px;
  position: relative; z-index: 10;
}
.nav-btn:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.primary {
  background: #6366f1; border-color: transparent; color: #fff;
}
.nav-btn.primary:hover:not(:disabled) { background: #4f46e5; }

.hint-text { color: #94a3b8; font-size: 12px; text-align: center; }

/* ====== Summary ====== */
.summary-wrap { display: none; animation: fadeInUp 0.5s ease; }
.summary-wrap .summary { text-align: center; padding: 40px 20px; }
.summary-icon { font-size: 56px; margin-bottom: 12px; }
.summary h2 { color: #1e293b; font-size: 24px; margin-bottom: 6px; }
.summary-score {
  font-size: 68px; font-weight: 800; color: #6366f1; margin: 10px 0;
}
.summary-stats {
  display: flex; justify-content: center; gap: 20px; margin: 22px 0; flex-wrap: wrap;
}
.stat-box {
  padding: 14px 20px; border-radius: 14px; background: #f8fafc;
  border: 1px solid #e2e8f0; min-width: 90px;
}
.stat-box .stat-num { font-size: 26px; font-weight: 700; }
.stat-box.correct-stat .stat-num { color: #16a34a; }
.stat-box.wrong-stat   .stat-num { color: #dc2626; }
.stat-box.total-stat   .stat-num { color: #6366f1; }
.stat-box .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }

.summary-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

/* ====== Footer ====== */
.footer {
  text-align: center; padding-top: 20px;
  color: #cbd5e1; font-size: 12px; letter-spacing: 0.5px;
}

/* ====== Responsive ====== */
@media (max-width: 600px) {
  .container { padding: 20px 14px; border-radius: 16px; }
  .unit-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .unit-card { padding: 14px 12px; }
  .unit-card .unit-title { font-size: 15px; }
  .sentence { font-size: 15px; padding: 12px 14px; }
  .option-btn { padding: 11px 12px; font-size: 14px; }
  .summary-score { font-size: 52px; }
  .stat-box { padding: 10px 14px; min-width: 75px; }
  .stat-box .stat-num { font-size: 22px; }
}
</style>
</head>

  </div>

  <div class="footer" id="footer">作者: Su1kai</div>
</div>

  const shuffled = shuffle(letters);
  const newOptions = {};
  shuffled.forEach((ltr, idx) => {
    newOptions[letters[idx]] = q.options[ltr];
  });
  // Find where answer moved
  const newAnswer = letters[shuffled.indexOf(q.answer)];
  return {
    sentence: q.sentence,
    options: newOptions,
    answer: newAnswer,
    answerText: q.answerText
  };
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  els.tocPage = document.getElementById('tocPage');
  els.quizArea = document.getElementById('quizArea');
  els.unitGrid = document.getElementById('unitGrid');
  els.card = document.getElementById('card');
  els.sentenceEl = document.getElementById('sentenceEl');
  els.optionsEl = document.getElementById('optionsEl');
  els.feedbackEl = document.getElementById('feedbackEl');
  els.summaryWrap = document.getElementById('summaryWrap');
  els.prevBtn = document.getElementById('prevBtn');
  els.nextBtn = document.getElementById('nextBtn');
  els.hintEl = document.getElementById('hintEl');
  els.progressFill = document.getElementById('progressFill');
  els.progressText = document.getElementById('progressText');
  els.scoreBadge = document.getElementById('scoreBadge');
  els.navRow = document.getElementById('navRow');

  buildToc();

  // Bind nav buttons with addEventListener for reliability
  els.prevBtn.addEventListener('click', prevQuestion);
  els.nextBtn.addEventListener('click', nextQuestion);

  document.addEventListener('keydown', (e) => {
    if (els.quizArea.style.display === 'none') return;
    if (e.key === 'ArrowLeft')  { e.preventDefault(); prevQuestion(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); nextQuestion(); }
  });

  // Touch swipe
  let touchX = 0;
  els.card.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  els.card.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchX;
    if (Math.abs(diff) > 60) { diff < 0 ? nextQuestion() : prevQuestion(); }
  });
});

// ===== TOC =====
function buildToc() {
  let html = '';
  DATA.units.forEach(u => {
    html += `<div class="unit-card" onclick="startUnit('${u.id}')">
      <div class="unit-title">${u.labelFull}</div>
      <div class="unit-count">${u.total} 题</div>
    </div>`;
  });
  // "All" card
  html += `<div class="unit-card all-card" onclick="startAll()">
    <div class="unit-title">全部题目</div>
    <div class="unit-count">${DATA.totalAll} 题随机</div>
  </div>`;
  els.unitGrid.innerHTML = html;
}

function startUnit(unitId) {
  const unit = DATA.units.find(u => u.id === unitId);
  if (!unit) return;
  currentQuestions = shuffle(unit.questions).map(shuffleOptions);
  startQuiz();
}

function startAll() {
  const allQs = [];
  DATA.units.forEach(u => allQs.push(...u.questions));
  currentQuestions = shuffle(allQs).map(shuffleOptions);
  startQuiz();
}

function startQuiz() {
  currentIndex = 0;
  answers = new Array(currentQuestions.length).fill(null);
  selectedLetters = new Array(currentQuestions.length).fill(null);
  isAnimating = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }

  els.tocPage.style.display = 'none';
  els.quizArea.style.display = 'block';
  els.summaryWrap.style.display = 'none';
  els.card.style.display = 'block';
  els.navRow.style.display = 'flex';
  els.scoreBadge.style.display = 'none';

  renderQuestion();
  updateProgress();
}

function goToToc() {
  els.tocPage.style.display = 'block';
  els.quizArea.style.display = 'none';
}

// ===== RENDER =====
function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const answered = answers[currentIndex];

  // Sentence
  let sentHtml = q.sentence.replace(/_____/g,
    '<span class="blank' +
    (answered === true ? ' filled' : (answered === false ? ' filled-wrong' : '')) +
    '">______</span>');
  els.sentenceEl.innerHTML = sentHtml;

  // Options
  const letters = ['A','B','C','D'];
  let optHtml = '';
  for (const l of letters) {
    let cls = 'option-btn';
    let dis = '';
    if (answered !== null) {
      dis = ' disabled';
      if (l === q.answer) {
        cls += ' correct';
      } else if (l === selectedLetters[currentIndex]) {
        cls += ' wrong';
      } else if (answered === false && l === q.answer) {
        cls += ' reveal-correct';
      }
    }
    optHtml += `<button class="${cls}${dis}" data-letter="${l}"
      onclick="selectAnswer('${l}')"><span class="letter">${l}</span><span>${q.options[l]}</span></button>`;
  }
  els.optionsEl.innerHTML = optHtml;

  // Feedback
  if (answered === true) showFeedback(true);
  else if (answered === false) showFeedback(false);
  else { els.feedbackEl.className = 'feedback'; els.feedbackEl.textContent = ''; }

  updateNav();
  updateProgress();
}

function selectAnswer(letter) {
  if (answers[currentIndex] !== null) return;
  const q = currentQuestions[currentIndex];
  const correct = (letter === q.answer);

  answers[currentIndex] = correct;
  selectedLetters[currentIndex] = letter;

  // Update buttons
  els.optionsEl.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.add('disabled');
    const bl = btn.getAttribute('data-letter');
    if (bl === letter && !correct) btn.classList.add('wrong');
    if (bl === q.answer) btn.classList.add('correct');
  });

  showFeedback(correct);
  updateProgress();

  // Only auto-advance on correct answer; wrong answer waits for manual advance
  if (correct) {
    autoAdvanceTimer = setTimeout(() => {
      if (currentIndex < currentQuestions.length - 1) nextQuestion();
      else checkAllDone();
    }, 200);
  }
}

function showFeedback(correct) {
  els.feedbackEl.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  if (correct) {
    els.feedbackEl.textContent = '✓ 正确！';
  } else {
    const q = currentQuestions[currentIndex];
    els.feedbackEl.textContent = '✗ 错误。正确答案是 ' + q.answer + '. ' + q.answerText;
  }
}

// ===== NAV =====
function prevQuestion() {
  if (isAnimating || currentIndex <= 0) return;
  // Cancel any pending auto-advance from previous correct answer
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  isAnimating = true;
  animateCard(-1, () => {
    currentIndex--;
    isAnimating = false;
    renderQuestion();
  });
}

function nextQuestion() {
  if (isAnimating) return;
  if (currentIndex >= currentQuestions.length - 1) { checkAllDone(); return; }
  // Cancel any pending auto-advance from previous correct answer
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  isAnimating = true;
  animateCard(1, () => {
    currentIndex++;
    isAnimating = false;
    renderQuestion();
  });
}

function animateCard(dir, cb) {
  els.card.classList.remove('slide-in');
  els.card.classList.add(dir > 0 ? 'slide-left' : 'slide-right');
  setTimeout(() => {
    cb();
    els.card.classList.remove('slide-left', 'slide-right');
    els.card.classList.add('slide-in');
  }, 280);
}

function updateNav() {
  els.prevBtn.disabled = (currentIndex === 0);
  if (currentIndex >= currentQuestions.length - 1) {
    els.nextBtn.textContent = '查看结果 →';
  } else {
    els.nextBtn.textContent = '下一题 →';
  }
}

function checkAllDone() {
  if (answers.every(a => a !== null) || currentIndex >= currentQuestions.length - 1) {
    showSummary();
  }
}

function updateProgress() {
  const answeredCount = answers.filter(a => a !== null).length;
  const pct = (answeredCount / currentQuestions.length) * 100;
  els.progressFill.style.width = pct + '%';
  els.progressText.textContent = (currentIndex + 1) + ' / ' + currentQuestions.length;
  const correctCount = answers.filter(a => a === true).length;
  if (correctCount > 0) {
    els.scoreBadge.style.display = 'inline';
    els.scoreBadge.textContent = '✓ ' + correctCount;
  } else {
    els.scoreBadge.style.display = 'none';
  }
}

// ===== SUMMARY =====
function showSummary() {
  const total = currentQuestions.length;
  const correct = answers.filter(a => a === true).length;
  const wrong = answers.filter(a => a === false).length;
  const pct = Math.round((correct / total) * 100);

  let emoji, msg;
  if (pct >= 90)      { emoji = '🏆'; msg = '太棒了！'; }
  else if (pct >= 75) { emoji = '🎉'; msg = '表现不错！'; }
  else if (pct >= 60) { emoji = '💪'; msg = '继续加油！'; }
  else                 { emoji = '📚'; msg = '多多练习！'; }

  els.summaryWrap.innerHTML = `<div class="summary">
    <div class="summary-icon">${emoji}</div>
    <h2>${msg}</h2>
    <div class="summary-score">${pct}%</div>
    <div class="summary-stats">
      <div class="stat-box correct-stat"><div class="stat-num">${correct}</div><div class="stat-label">正确</div></div>
      <div class="stat-box wrong-stat"><div class="stat-num">${wrong}</div><div class="stat-label">错误</div></div>
      <div class="stat-box total-stat"><div class="stat-num">${total}</div><div class="stat-label">总题数</div></div>
    </div>
    <div class="summary-actions">
      <button class="nav-btn" onclick="retryQuiz()">重新开始</button>
      <button class="nav-btn primary" onclick="goToToc()">返回目录</button>
    </div>
  </div>`;

  els.summaryWrap.style.display = 'block';
  els.card.style.display = 'none';
  els.navRow.style.display = 'none';
  els.feedbackEl.className = 'feedback';
  els.progressFill.style.width = '100%';
  els.progressText.textContent = total + ' / ' + total;
}

function retryQuiz() {
  // Re-shuffle
  if (currentQuestions.length === DATA.totalAll) {
    // was "all" mode
    const allQs = [];
    DATA.units.forEach(u => allQs.push(...u.questions));
    currentQuestions = shuffle(allQs).map(shuffleOptions);
  } else {
    // was unit mode - find which unit
    for (const u of DATA.units) {
      if (u.questions.length === currentQuestions.length) {
        currentQuestions = shuffle(u.questions).map(shuffleOptions);
        break;
      }
    }
  }
  currentIndex = 0;
  answers = new Array(currentQuestions.length).fill(null);
  selectedLetters = new Array(currentQuestions.length).fill(null);
  isAnimating = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  els.summaryWrap.style.display = 'none';
  els.card.style.display = 'block';
  els.navRow.style.display = 'flex';
  els.scoreBadge.style.display = 'none';
  renderQuestion();
  updateProgress();
}
</script>
</body>
</html>
